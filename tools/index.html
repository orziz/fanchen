<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>凡尘立道录工具台</title>
  <script type="module" src="/src/styles/tools.css"></script>
</head>
<body>
  <div class="tool-shell">
    <div class="tool-frame">
      <header class="tool-header">
        <div>
          <h1 class="tool-title">凡尘立道录工具台</h1>
          <p class="tool-subtitle">这些页面只用于开发时编辑配置，保存会直接回写源码文件，不参与正式发布包。</p>
        </div>
      </header>
      <main class="tool-card-grid">
        <a class="tool-card" href="/tools/map-editor.html">
          <strong>地图编辑器</strong>
          <span class="tool-meta">拖拽地点、增删节点、连接或断开路网、校验双向邻接并回写地图配置。</span>
        </a>
        <a class="tool-card" href="/tools/item-editor.html">
          <strong>道具编辑器</strong>
          <span class="tool-meta">这一轮提供基础骨架：列表、搜索、字段编辑与保存，学识札记仍由知识配置派生。</span>
        </a>
      </main>
    </div>
  </div>
</body>
</html>
